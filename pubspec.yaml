name: stockist
description: "Mobile Offline Stock & SPG Reconciliation App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  bloc_concurrency: ^0.2.5
  
  # Dependency Injection
  get_it: ^8.0.3
  
  # Navigation
  go_router: ^14.2.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Utilities
  path_provider: ^2.1.1
  intl: ^0.20.2
  share_plus: ^7.2.1
  excel: ^4.0.2
  uuid: ^4.3.3
  dartz: ^0.10.1
  
  # Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
